        // ============================================================
        //  12. TTS (Part 2.1)
        // ============================================================

        function playTTS(text) {
            return new Promise((resolve, reject) => {
                if (!window.speechSynthesis) {
                    reject(new Error('TTS not supported'));
                    return;
                }
                if (STATE.ttsUtterance) {
                    window.speechSynthesis.cancel();
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.0;
                utterance.volume = 1;
                STATE.ttsUtterance = utterance;
                STATE.isTTSPlaying = true;

                const dot = document.getElementById('ttsDot');
                const statusText = document.getElementById('ttsStatusText');
                if (dot) dot.classList.add('playing');
                if (statusText) statusText.textContent = '🔊 Playing...';

                utterance.onend = () => {
                    STATE.isTTSPlaying = false;
                    STATE.ttsUtterance = null;
                    if (dot) dot.classList.remove('playing');
                    if (statusText) statusText.textContent = '✅ Complete';
                    resolve();
                };
                utterance.onerror = (e) => {
                    STATE.isTTSPlaying = false;
                    STATE.ttsUtterance = null;
                    if (dot) dot.classList.remove('playing');
                    if (statusText) statusText.textContent = '⚠️ Error';
                    reject(e);
                };
                window.speechSynthesis.speak(utterance);
                setTimeout(() => {
                    if (STATE.isTTSPlaying) {
                        window.speechSynthesis.cancel();
                        STATE.isTTSPlaying = false;
                        STATE.ttsUtterance = null;
                        if (dot) dot.classList.remove('playing');
                        if (statusText) statusText.textContent = '⏱ Timeout';
                        resolve();
                    }
                }, 120000);
            });
        }

        // ============================================================
        //  13. SPEECH RECOGNITION
        // ============================================================

        function initSpeechRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const recognition = new SR();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            try { recognition.processLocally = true; } catch (e) { /* ignore */ }
            return recognition;
        }

        function startSpeechRecognition(phaseKey) {
            stopSpeechRecognition();
            if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                showSpeechStatus('❌ Speech recognition not supported', 'idle');
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    const recognition = initSpeechRecognition();
                    if (!recognition) {
                        showSpeechStatus('❌ Init failed', 'idle');
                        return;
                    }
                    STATE.recognition = recognition;
                    let finalTranscript = '';
                    const textarea = document.querySelector('.speech-box textarea');

                    recognition.onresult = (event) => {
                        let interim = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                finalTranscript += t + ' ';
                            } else {
                                interim += t;
                            }
                        }
                        if (textarea) {
                            textarea.value = finalTranscript + (interim ? '[' + interim + ']' : '');
                            textarea.scrollTop = textarea.scrollHeight;
                        }
                    };

                    recognition.onerror = (event) => {
                        console.warn('Speech recognition error:', event.error);
                        if (event.error === 'not-allowed') {
                            showSpeechStatus('❌ Microphone access denied', 'idle');
                        } else if (event.error === 'no-speech') {
                            showSpeechStatus('🔇 No speech detected', 'idle');
                        } else {
                            showSpeechStatus('⚠️ Error: ' + event.error, 'idle');
                        }
                        if (event.error !== 'not-allowed' && STATE.subPhase === 'speaking') {
                            setTimeout(() => {
                                if (STATE.subPhase === 'speaking' && !STATE.isRecording) {
                                    startSpeechRecognition(phaseKey);
                                }
                            }, 500);
                        }
                    };

                    recognition.onend = () => {
                        STATE.isRecording = false;
                        showSpeechStatus('⏹ Stopped', 'idle');
                        if (STATE.subPhase === 'speaking' && !STATE.hasAutoAdvanced) {
                            setTimeout(() => {
                                if (STATE.subPhase === 'speaking' && !STATE.isRecording) {
                                    startSpeechRecognition(phaseKey);
                                }
                            }, 300);
                        }
                    };

                    try {
                        recognition.start();
                        STATE.isRecording = true;
                        showSpeechStatus('🔴 Recording... Please speak', 'recording');
                    } catch (e) {
                        showSpeechStatus('⚠️ Start failed: ' + e.message, 'idle');
                    }
                })
                .catch(() => {
                    showSpeechStatus('❌ Cannot access microphone', 'idle');
                });
        }

        function stopSpeechRecognition() {
            if (STATE.recognition) {
                try { STATE.recognition.stop(); } catch (e) { /* ignore */ }
                STATE.recognition = null;
            }
            STATE.isRecording = false;
            showSpeechStatus('⏹ Stopped', 'idle');
        }

        function showSpeechStatus(text, type) {
            const statusEl = document.getElementById('recordStatus');
            if (statusEl) {
                statusEl.textContent = text;
                statusEl.className = 'record-status-text ' + (type || 'idle');
            }
            const speechStatus = document.getElementById('speechStatus');
            if (speechStatus) {
                speechStatus.textContent = text;
                speechStatus.className = 'record-status-text ' + (type || 'idle');
            }
        }

        // ============================================================
        //  14. STOP ALL
        // ============================================================

        function stopAll() {
            clearInterval(STATE.timerId);
            STATE.timerId = null;
            stopSpeechRecognition();
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            STATE.isTTSPlaying = false;
            STATE.isWarmupTTSPlaying = false;
            STATE.ttsUtterance = null;
            dom.phaseTimer.classList.remove('warning');
        }

        // ============================================================
        //  15. INIT
        // ============================================================

        function init() {
            if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                const note = document.createElement('div');
                note.style.cssText =
                    'background:#fff3e0;padding:10px 16px;border-radius:10px;margin-top:12px;color:#a8670e;font-size:0.85rem;border:1px solid #f7e3b6;text-align:center;';
                note.textContent = '💡 Speech recognition is not supported in this browser. Please use Chrome or Edge for full functionality.';
                document.querySelector('.content-area').appendChild(note);
            }
            enterPhase('start');
        }

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', stopAll);
    </script>
