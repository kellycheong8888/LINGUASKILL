<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>影子跟读 · Linguaskill Business</title>
    <style>
        /* ===== 全局重置 & 暖阳主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fbf8f0;
            color: #3d3d3d;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 16px 14px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 820px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8e0d8;
        }

        .app-header h1 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #5b8c5a;
            letter-spacing: 0.5px;
        }

        .app-header h1 span {
            color: #d4a373;
        }

        .version-badge {
            font-size: 0.7rem;
            background: #e8e0d8;
            padding: 3px 14px;
            border-radius: 30px;
            color: #8a7a6a;
            cursor: default;
            user-select: none;
            transition: 0.2s;
        }

        .version-badge:active {
            transform: scale(0.95);
        }

        /* ===== 浏览器警告 ===== */
        .browser-warning {
            background: #f5ede4;
            color: #8a6a4a;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            border-left: 4px solid #d4a373;
        }

        .browser-warning.show {
            display: flex;
        }

        /* ===== 控制栏 ===== */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 12px;
            margin-bottom: 20px;
            background: #ffffff;
            padding: 12px 18px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(160, 120, 80, 0.08);
            border: 1px solid #ece5dd;
        }

        .control-bar select {
            background: #f5f0eb;
            color: #3d3d3d;
            border: 1px solid #d5cdc5;
            padding: 7px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }

        .control-bar select:focus {
            border-color: #5b8c5a;
            box-shadow: 0 0 0 3px rgba(91, 140, 90, 0.15);
        }

        #passageSelect {
            min-width: 150px;
        }

        #voiceSelect {
            min-width: 140px;
        }

        .progress-text {
            font-size: 0.9rem;
            background: #f5f0eb;
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #d5cdc5;
            white-space: nowrap;
            font-weight: 500;
            color: #6a5a4a;
        }

        .action-btn {
            background: #5b8c5a;
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 7px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.25s;
            margin-left: auto;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(91, 140, 90, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            cursor: not-allowed;
        }

        .action-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .action-btn.secondary {
            background: #d4a373;
            box-shadow: 0 4px 14px rgba(212, 163, 115, 0.3);
        }

        .action-btn.outline {
            background: transparent;
            color: #5b8c5a;
            border: 2px solid #5b8c5a;
            box-shadow: none;
        }

        .action-btn.outline:hover {
            background: #f0f7ef;
        }

        /* ===== 句子列表 ===== */
        .sentences-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 16px 0 24px;
        }

        .sentence-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 16px 20px;
            border-left: 6px solid #d5cdc5;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(160, 120, 80, 0.06);
            border: 1px solid #ece5dd;
        }

        .sentence-card.active-tts {
            border-left-color: #d4a373;
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.15), 0 4px 24px rgba(160, 120, 80, 0.1);
            animation: breathe-glow-light 1.6s infinite;
        }

        @keyframes breathe-glow-light {
            0% { box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1), 0 2px 12px rgba(0,0,0,0.04); }
            50% { box-shadow: 0 0 0 8px rgba(212, 163, 115, 0.2), 0 4px 24px rgba(212, 163, 115, 0.12); }
            100% { box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1), 0 2px 12px rgba(0,0,0,0.04); }
        }

        .sentence-card.recording {
            border-left-color: #c0392b;
            box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.12), 0 4px 20px rgba(192, 57, 43, 0.08);
            animation: pulse-rec-light 0.9s infinite;
        }

        @keyframes pulse-rec-light {
            0% { box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }
            50% { box-shadow: 0 0 0 10px rgba(192, 57, 43, 0.18); }
            100% { box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }
        }

        .sentence-card.completed {
            border-left-color: #7aa87a;
        }

        /* ===== 英文 & 翻译 ===== */
        .sentence-text {
            font-size: 17px;
            line-height: 1.7;
            color: #3d3d3d;
            cursor: pointer;
            padding: 4px 0;
            border-radius: 4px;
            transition: 0.2s;
            user-select: none;
        }

        .sentence-text.hidden {
            background: #e8e0d8;
            color: transparent;
            border-radius: 6px;
            padding: 4px 10px;
            min-height: 1.7em;
            cursor: pointer;
        }

        .sentence-text.hidden::before {
            content: "👆 点击显示英文";
            color: #8a7a6a;
            font-size: 14px;
        }

        .translation-area {
            margin-top: 6px;
            font-size: 15px;
            color: #6a5a4a;
            padding: 6px 12px;
            background: #f5f0eb;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s;
            min-height: 2.2em;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .translation-area.hidden {
            background: #e8e0d8;
            color: transparent;
        }

        .translation-area.hidden::before {
            content: "👆 点击显示翻译";
            color: #8a7a6a;
            font-size: 14px;
        }

        .translation-area .zh-text {
            color: #3d3d3d;
        }

        .translation-area.hidden .zh-text {
            display: none;
        }

        /* ===== 状态栏 ===== */
        .card-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #8a7a6a;
            flex-wrap: wrap;
            gap: 4px;
        }

        .accuracy-badge {
            color: #5b8c5a;
            font-weight: 600;
            background: #f0f7ef;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        /* ===== 对比结果 ===== */
        .comparison-result {
            margin-top: 10px;
            background: #f5f0eb;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.92rem;
            display: none;
            flex-wrap: wrap;
            gap: 4px 6px;
            border-left: 4px solid #d4a373;
        }

        .comparison-result.show {
            display: flex;
        }

        .word-match {
            color: #5b8c5a;
            font-weight: 500;
        }

        .word-mismatch {
            color: #c0392b;
            background: #fdedec;
            padding: 0 6px;
            border-radius: 4px;
            position: relative;
            font-weight: 500;
        }

        .word-mismatch::after {
            content: attr(data-correct);
            position: absolute;
            bottom: -1.4em;
            left: 0;
            font-size: 0.7rem;
            color: #a93226;
            background: #fff;
            padding: 0 8px;
            border-radius: 6px;
            white-space: nowrap;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .word-mismatch:hover::after {
            display: block;
        }

        /* ===== 手动输入框 ===== */
        .manual-input-area {
            margin-top: 10px;
            display: none;
            gap: 8px;
            flex-wrap: wrap;
        }

        .manual-input-area.show {
            display: flex;
        }

        .manual-input-area input {
            flex: 1;
            min-width: 150px;
            padding: 8px 14px;
            border: 2px solid #d5cdc5;
            border-radius: 30px;
            font-size: 0.9rem;
            background: #ffffff;
            outline: none;
            transition: 0.2s;
        }

        .manual-input-area input:focus {
            border-color: #5b8c5a;
            box-shadow: 0 0 0 3px rgba(91, 140, 90, 0.12);
        }

        .manual-input-area .mini-btn {
            background: #5b8c5a;
            color: #fff;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .manual-input-area .mini-btn:hover {
            background: #4a7a49;
        }

        /* ===== 波形 ===== */
        .waveform-wrapper {
            background: #f5f0eb;
            border-radius: 14px;
            padding: 4px 0;
            margin: 6px 0 2px;
            height: 48px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .waveform-wrapper.active {
            display: flex;
        }

        .waveform-wrapper canvas {
            width: 100%;
            height: 40px;
            border-radius: 10px;
            background: #f5f0eb;
        }

        /* ===== 每句按钮组 ===== */
        .sentence-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #ece5dd;
        }

        .sentence-actions .mini-btn {
            background: #f5f0eb;
            border: 1px solid #d5cdc5;
            color: #3d3d3d;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sentence-actions .mini-btn:hover {
            background: #ece5dd;
        }

        .sentence-actions .mini-btn.active {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
            animation: pulse-rec-light 0.9s infinite;
        }

        .sentence-actions .mini-btn.primary {
            background: #5b8c5a;
            color: #fff;
            border-color: #5b8c5a;
        }

        .sentence-actions .mini-btn.primary:hover {
            background: #4a7a49;
        }

        .sentence-actions .mini-btn.success {
            background: #7aa87a;
            color: #fff;
            border-color: #7aa87a;
        }

        .sentence-actions .mini-btn.success:hover {
            background: #6a9a6a;
        }

        .sentence-actions .mini-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 报告区域 ===== */
        .report-area {
            background: #ffffff;
            border-radius: 20px;
            padding: 22px;
            margin-top: 24px;
            display: none;
            border: 1px solid #ece5dd;
            box-shadow: 0 4px 24px rgba(160, 120, 80, 0.06);
        }

        .report-area.show {
            display: block;
        }

        .report-area h3 {
            color: #5b8c5a;
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .report-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 32px;
            background: #f5f0eb;
            padding: 14px 20px;
            border-radius: 16px;
        }

        .report-stats div {
            font-size: 0.92rem;
        }

        .report-stats strong {
            color: #5b8c5a;
        }

        .report-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .report-actions .action-btn {
            margin-left: 0;
        }

        /* ===== 历史记录 ===== */
        .history-area {
            margin-top: 24px;
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 0.85rem;
            border: 1px solid #ece5dd;
        }

        .history-area h4 {
            color: #8a7a6a;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #f0ebe5;
            color: #4a4a4a;
        }

        /* ===== 通用 ===== */
        .flex-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mt-8 { margin-top: 8px; }
        .text-muted { color: #8a7a6a; font-size: 0.85rem; }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .control-bar select {
                width: 100%;
            }
            .action-btn {
                margin-left: 0;
                text-align: center;
            }
            .sentence-actions {
                gap: 5px;
            }
            .sentence-actions .mini-btn {
                font-size: 0.72rem;
                padding: 4px 10px;
            }
            .sentence-text {
                font-size: 15px;
            }
            .app-header h1 {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 420px) {
            .sentence-actions .mini-btn {
                font-size: 0.65rem;
                padding: 3px 8px;
            }
            .sentence-card {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- 头部 -->
    <div class="app-header">
        <h1>Linguaskill · <span>Business</span></h1>
        <span class="version-badge" id="versionBadge" title="双击清空所有数据">v2.1.0</span>
    </div>

    <!-- 浏览器警告 -->
    <div class="browser-warning" id="browserWarning">⚠️ 当前浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器。</div>

    <!-- 控制栏 -->
    <div class="control-bar">
        <select id="passageSelect"></select>
        <select id="voiceSelect">
            <option value="en-GB-SoniaNeural">🎤 Sonia（温柔女声）</option>
            <option value="en-GB-AdaMultilingualNeural">🎤 Ada（活泼女声）</option>
            <option value="en-GB-OllieMultilingualNeural">🎤 Ollie（温暖男声）</option>
        </select>
        <span class="progress-text" id="progressText">0 / 0</span>
        <button class="action-btn" id="mainActionBtn">▶ 开始训练</button>
        <button class="action-btn secondary" id="stopRecordingBtn" style="display:none;">⏹ 停止录音</button>
    </div>

    <!-- 句子列表 -->
    <div id="sentencesContainer" class="sentences-list"></div>

    <!-- 报告 -->
    <div class="report-area" id="reportArea">
        <h3>📊 训练报告</h3>
        <div class="report-stats" id="reportStats"></div>
        <div style="margin-top:12px; background:#f5f0eb; padding:12px 16px; border-radius:12px;" id="worstSentences"></div>
        <div style="margin-top:12px; background:#f5f0eb; padding:12px 16px; border-radius:12px;" id="errorWordsSummary"></div>
        <div class="report-actions">
            <button class="action-btn" id="retrainBtn">🔄 重新训练</button>
            <button class="action-btn secondary" id="exportReportBtn" style="background:#d4a373; box-shadow:0 4px 14px rgba(212,163,115,0.3);">📄 导出报告</button>
        </div>
    </div>

    <!-- 历史记录 -->
    <div class="history-area" id="historyArea">
        <h4>📋 最近训练记录</h4>
        <div id="historyList"></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ================================================================
        // 1. 范文数据 (包含投诉处理 + 所有新范文)
        // ================================================================
        const passages = [
            // ---- 原有范文：投诉处理 ----
            {
                title: "How to Handle Customer Complaints Effectively",
                sentences: [
                    { en: "When dealing with customer complaints, the first step is to listen actively.", zh: "在處理客戶投訴時，第一步是積極傾聽。" },
                    { en: "You should let the customer express their frustration without interruption.", zh: "你應該讓客戶完整表達他們的不滿，不要打斷。" },
                    { en: "After understanding the issue, apologize sincerely and take responsibility.", zh: "在了解問題之後，真誠地道歉並承擔責任。" },
                    { en: "Then, propose a clear solution and explain the steps you will take.", zh: "然後，提出明確的解決方案，並說明你將採取的步驟。" },
                    { en: "Finally, follow up with the customer to ensure their satisfaction.", zh: "最後，跟進客戶以確保他們滿意。" },
                    { en: "This approach not only resolves the problem but also builds trust.", zh: "這種方法不僅能解決問題，還能建立信任。" },
                    { en: "A well-handled complaint can turn a dissatisfied customer into a loyal one.", zh: "處理得當的投訴可以將不滿意的客戶轉變為忠實的客戶。" }
                ]
            },
            // ===== Part 1 — Presentation =====
            {
                title: "Part 1 — 慶祝活動",
                sentences: [
                    { en: "I'd like to talk about a celebration I went to last year.", zh: "我想談談我去年參加的一場慶祝活動。" },
                    { en: "It was my best friend's wedding, which took place at a beautiful countryside hotel near the coast.", zh: "那是我最好朋友的婚禮，在靠近海邊的一個美麗鄉村酒店舉行。" },
                    { en: "The reason for the celebration was, of course, the marriage of my friend and his partner.", zh: "慶祝的原因當然是我朋友和他伴侶的婚禮。" },
                    { en: "They had been together for over seven years, so everyone was incredibly happy to finally see them tie the knot.", zh: "他們在一起超過七年了，所以每個人看到他們終於步入婚姻殿堂都感到非常開心。" },
                    { en: "The ceremony was held outdoors in the garden, surrounded by flowers and fairy lights.", zh: "儀式在花園裡戶外舉行，周圍環繞著鮮花和仙女燈。" },
                    { en: "While I was there, I felt genuinely overjoyed.", zh: "在那裡的時候，我感到由衷的喜悅。" },
                    { en: "It was wonderful to see my friend so happy, and I also enjoyed catching up with old university friends who I hadn't seen for years.", zh: "看到我的朋友如此幸福真是太好了，我也很享受和多年不見的大學老友敘舊。" },
                    { en: "The atmosphere was full of love and laughter, and I even danced for the first time in a long time!", zh: "整個氣氛充滿了愛和歡笑，我甚至跳了舞——這是我很久以來第一次跳舞！" }
                ]
            },
            {
                title: "Part 1 — 成功的團隊專案",
                sentences: [
                    { en: "Last year, I worked on a project to revamp our company's client onboarding portal.", zh: "去年，我參與了一個改造公司客戶入門網站的專案。" },
                    { en: "The project involved a cross-functional team of five people, including a software developer, a UX designer, two customer service representatives, and myself acting as the project coordinator.", zh: "這個專案涉及一個由五人組成的跨職能團隊，包括一名軟體開發人員、一名 UX 設計師、兩名客服代表，以及我自己擔任專案協調員。" },
                    { en: "My role was to keep everyone on schedule and facilitate communication between the design and technical teams.", zh: "我的職責是確保每個人按時完成工作，並促進設計團隊和技術團隊之間的溝通。" },
                    { en: "The project was highly successful because we launched the portal two weeks ahead of schedule and saw a 30% reduction in client setup errors within the first month.", zh: "這個專案非常成功，因為我們比預定時間提前兩週推出了網站，並且在第一個月內客戶設置錯誤減少了 30%。" },
                    { en: "We achieved this because we held brief, daily stand-up meetings to resolve issues immediately rather than letting them pile up.", zh: "我們之所以能達成這個目標，是因為我們每天舉行簡短的站立會議，即時解決問題，而不是讓問題累積。" },
                    { en: "Looking back, I feel incredibly proud of our effort.", zh: "回想起來，我對我們的努力感到非常自豪。" },
                    { en: "It proved to me that clear communication and mutual respect are just as important as technical skills when delivering a complex business project.", zh: "這向我證明了，在交付複雜的商業專案時，清晰的溝通和相互尊重與技術技能同樣重要。" }
                ]
            },
            {
                title: "Part 1 — 想為家裡買的東西",

        // ================================================================
        // 3. 初始化
        // ================================================================
        function init() {
            if (!hasRecognition) {
                browserWarning.classList.add('show');
            }
            populatePassageSelect();
            loadFromStorageOrReset();
            bindEvents();
            renderSentences();
            updateProgress();
            updateHistory();
            checkUnfinished();
        }

        function populatePassageSelect() {
            passageSelect.innerHTML = '';
            passages.forEach((p, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = p.title || `范文 ${idx+1}`;
                passageSelect.appendChild(opt);
            });
            passageSelect.value = currentPassageIndex;
        }

        function loadFromStorageOrReset() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.passageIndex !== undefined && data.sentenceStates) {
                        currentPassageIndex = data.passageIndex;
                        sentenceStates = data.sentenceStates;
                        const sentences = passages[currentPassageIndex]?.sentences || [];
                        while (sentenceStates.length < sentences.length) {
                            sentenceStates.push({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false });
                        }
                        const allDone = sentenceStates.every(s => s.status === 'done');
                        if (allDone && sentenceStates.length > 0) {
                            isTrainingComplete = true;
                            showReport();
                        }
                        return;
                    }
                } catch(e) {}
            }
            resetAllState();
        }

        function resetAllState() {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            sentenceStates = sentences.map(() => ({
                status: 'idle',
                transcript: '',
                accuracy: 0,
                wordResults: [],
                audioBlob: null,
                enVisible: true,
                zhVisible: false
            }));
            isTrainingComplete = false;
            trainingActive = false;
            currentSentenceIndex = 0;
            reportArea.classList.remove('show');
            localStorage.removeItem(STORAGE_KEY);
            currentRecordingBlob = null;
        }

        function saveState() {
            const data = {
                passageIndex: currentPassageIndex,
                sentenceStates: sentenceStates
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function checkUnfinished() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.sentenceStates && data.sentenceStates.some(s => s.status === 'idle' || s.status === 'tts' || s.status === 'recording')) {
                        if (confirm('检测到未完成的训练，是否继续？')) {
                            renderSentences();
                            updateProgress();
                            return;
                        } else {
                            localStorage.removeItem(STORAGE_KEY);
                            resetAllState();
                            renderSentences();
                            updateProgress();
                        }
                    }
                } catch(e) {}
            }
        }

        // ================================================================
        // 4. 渲染句子
        // ================================================================
        function renderSentences() {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (sentences.length === 0) {
                sentencesContainer.innerHTML = '<div style="color:#8a7a6a; padding:20px; text-align:center;">暂无句子</div>';
                return;
            }
            while (sentenceStates.length < sentences.length) {
                sentenceStates.push({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false });
            }

            let html = '';
            sentences.forEach((s, idx) => {
                const state = sentenceStates[idx] || { status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false };
                let statusClass = '';
                let statusIcon = '⏳';
                let accuracyHtml = '';
                let comparisonHtml = '';
                let waveformHtml = '';
                let statusText = '待训练';
                let manualInputHtml = '';

                if (state.status === 'tts') {
                    statusClass = 'active-tts';
                    statusIcon = '🔊';
                    statusText = '朗读中...';
                } else if (state.status === 'recording') {
                    statusClass = 'recording';
                    statusIcon = '🎙️';
                    statusText = '录音中...';
                } else if (state.status === 'done') {
                    statusClass = 'completed';
                    statusIcon = '✅';
                    statusText = '已完成';
                    const acc = state.accuracy || 0;
                    accuracyHtml = `<span class="accuracy-badge">${acc}%</span>`;
                    if (state.wordResults && state.wordResults.length) {
                        const wordsHtml = state.wordResults.map(w => {
                            if (w.match) return `<span class="word-match">${w.word}</span>`;
                            else return `<span class="word-mismatch" data-correct="${w.correct || ''}">${w.word}</span>`;
                        }).join(' ');
                        comparisonHtml = `<div class="comparison-result show">${wordsHtml}</div>`;
                    } else if (state.transcript) {
                        comparisonHtml = `<div class="comparison-result show" style="color:#6a5a4a;">识别: ${state.transcript}</div>`;
                    }
                } else {
                    if (state.audioBlob && !state.transcript) {
                        manualInputHtml = `
                            <div class="manual-input-area show">
                                <input type="text" id="manualInput_${idx}" placeholder="输入您刚才说的内容..." />
                                <button class="mini-btn" data-action="manualScore" data-idx="${idx}">确认评分</button>
                            </div>
                        `;
                    }
                }

                if (state.status === 'recording') {
                    waveformHtml = `
                        <div class="waveform-wrapper active" id="waveform_${idx}">
                            <canvas id="waveCanvas_${idx}"></canvas>
                        </div>
                    `;
                }

                const enHidden = state.enVisible === false ? 'hidden' : '';
                const zhHidden = state.zhVisible === false ? 'hidden' : '';

                html += `
                    <div class="sentence-card ${statusClass}" data-index="${idx}">
                        <div class="sentence-text ${enHidden}" data-idx="${idx}" data-type="en">${s.en}</div>
                        <div class="translation-area ${zhHidden}" data-idx="${idx}" data-type="zh">
                            <span class="zh-text">${s.zh}</span>
                        </div>
                        <div class="card-status">
                            <span>${statusIcon} ${statusText}</span>
                            ${accuracyHtml}
                        </div>
                        ${waveformHtml}
                        ${comparisonHtml}
                        ${manualInputHtml}
                        <div class="sentence-actions">
                            <button class="mini-btn primary" data-action="play" data-idx="${idx}">▶ 播放</button>
                            <button class="mini-btn ${state.status === 'recording' ? 'active' : ''}" data-action="record" data-idx="${idx}">${state.status === 'recording' ? '⏹ 停止' : '🎙 录音'}</button>
                            <button class="mini-btn" data-action="playback" data-idx="${idx}" ${state.audioBlob ? '' : 'disabled'}>🔁 回放</button>
                            <button class="mini-btn success" data-action="score" data-idx="${idx}" ${state.audioBlob ? '' : 'disabled'}>📊 评分</button>
                        </div>
                    </div>
                `;
            });

            sentencesContainer.innerHTML = html;
            bindSentenceActions();

            const recIdx = sentenceStates.findIndex(s => s.status === 'recording');
            if (recIdx !== -1) {
                const canvas = document.getElementById(`waveCanvas_${recIdx}`);
                if (canvas) {
                    setupWaveform(canvas);
                }
            }
        }

        // ================================================================
        // 5. 事件绑定
        // ================================================================
        function bindSentenceActions() {
            document.querySelectorAll('.sentence-actions').forEach(group => {
                group.querySelectorAll('.mini-btn').forEach(btn => {
                    btn.removeEventListener('click', handleAction);
                    btn.addEventListener('click', handleAction);
                });
            });

            document.querySelectorAll('[data-action="manualScore"]').forEach(btn => {
                btn.removeEventListener('click', handleManualScore);
                btn.addEventListener('click', handleManualScore);
            });

            document.querySelectorAll('.sentence-text').forEach(el => {
                el.removeEventListener('click', toggleEnVisibility);
                el.addEventListener('click', toggleEnVisibility);
            });
            document.querySelectorAll('.translation-area').forEach(el => {
                el.removeEventListener('click', toggleZhVisibility);
                el.addEventListener('click', toggleZhVisibility);
            });
        }

        function toggleEnVisibility(e) {
            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const state = sentenceStates[idx];
            if (!state) return;
            state.enVisible = !state.enVisible;
            saveState();
            renderSentences();
        }

        function toggleZhVisibility(e) {
            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const state = sentenceStates[idx];
            if (!state) return;
            state.zhVisible = !state.zhVisible;
            saveState();
            renderSentences();
        }

        function handleAction(e) {
            const btn = e.currentTarget;
            const action = btn.dataset.action;
            const idx = parseInt(btn.dataset.idx);
            if (isNaN(idx)) return;

            switch(action) {
                case 'play': handlePlay(idx); break;
                case 'record': handleRecord(idx); break;
                case 'playback': handlePlayback(idx); break;
                case 'score': handleScore(idx); break;
            }
        }

        // ================================================================
        // 6. 核心功能函数 - 播放（Azure TTS + 降级）
        // ================================================================
        async function handlePlay(idx) {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (idx >= sentences.length) return;

            const text = sentences[idx].en;
            
            // ★★★ 从下拉菜单获取用户选择的语音 ★★★
            const voiceSelect = document.getElementById('voiceSelect');
            const voiceName = voiceSelect ? voiceSelect.value : 'en-GB-SoniaNeural';
            
            const rate = 1.0;   // 默认语速 1.0，范围 0.5-2.0
            const pitch = 0;    // 默认音调 0，范围 -50 到 50

            // ★★★ 重要：这里使用您的 Vercel API 地址 ★★★
            const apiUrl = `https://linguaskill-l3f85u1b1-kellycheong.vercel.app/api/tts`;
            
            try {
                // 显示加载状态
                const btn = document.querySelector(`.sentence-actions button[data-action="play"][data-idx="${idx}"]`);
                if (btn) btn.textContent = '⏳ 加载中...';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        voice: voiceName,
                        rate: rate,
                        pitch: pitch
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 请求失败: ${response.status}`);
                }

                // 获取音频数据并播放
                const audioData = await response.arrayBuffer();
                const audioBlob = new Blob([audioData], { type: 'audio/mpeg' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                const audio = new Audio(audioUrl);
                audio.play();
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    if (btn) btn.textContent = '▶ 播放';
                };
                audio.onerror = () => {
                    console.warn('音频播放失败，降级到浏览器 TTS');
                    fallbackToBrowserTTS(text, idx);
                };

            } catch (error) {
                console.warn('Azure TTS 调用失败，降级到浏览器 TTS:', error.message);
                fallbackToBrowserTTS(text, idx);
            }
        }

        // ================================================================
        // 降级方案：浏览器自带 TTS
        // ================================================================
        function fallbackToBrowserTTS(text, idx) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);

            const btn = document.querySelector(`.sentence-actions button[data-action="play"][data-idx="${idx}"]`);
            if (btn) {
                setTimeout(() => { btn.textContent = '▶ 播放'; }, 500);
            }
        }

        function handleRecord(idx) {
            const state = sentenceStates[idx];
            if (!state) return;

            if (state.status === 'recording') {
                stopRecording(idx);
                return;
            }

            startRecordingSingle(idx);
        }

        function startRecordingSingle(idx) {
            if (!navigator.mediaDevices) {
                alert('浏览器不支持麦克风');
                return;
            }

            const state = sentenceStates[idx];
            state.status = 'recording';
            state.transcript = '';
            saveState();
            renderSentences();
            isRecording = true;

            const startStream = (stream) => {
                cachedStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                currentRecordingBlob = null;
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    currentRecordingBlob = blob;
                    state.audioBlob = blob;
                    saveState();
                    renderSentences();
                };
                mediaRecorder.start();

                if (hasRecognition) {
                    try {
                        recognition = new SR();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = 'en-US';
                        recognition.maxAlternatives = 1;
                        recognition.onresult = (event) => {
                            let final = '';
                            let interim = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    final += event.results[i][0].transcript;
                                } else {
                                    interim += event.results[i][0].transcript;
                                }
                            }
                            if (final) {
                                state.transcript = final.trim();
                                saveState();
                            } else if (interim) {
                                state.transcript = interim.trim();
                                saveState();
                            }
                        };
                        recognition.onerror = (e) => {
                            console.warn('语音识别错误:', e.error);
                        };
                        recognition.start();
                    } catch(e) {
                        console.warn('语音识别启动失败:', e);
                    }
                }

                const canvas = document.getElementById(`waveCanvas_${idx}`);
                if (canvas) setupWaveform(canvas);

                clearTimeout(recordingTimer);
                recordingTimer = setTimeout(() => {
                    if (state.status === 'recording') stopRecording(idx);
                }, 15000);
            };

            if (cachedStream) {
                startStream(cachedStream);
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        startStream(stream);
                    })
                    .catch(err => {
                        alert('麦克风授权被拒绝，请在浏览器中允许麦克风权限后重试。');
                        state.status = 'idle';
                        saveState();
                        renderSentences();
                    });
            }
        }

        function stopRecording(idx) {
            const state = sentenceStates[idx];
            if (!state || state.status !== 'recording') return;
            isRecording = false;
            clearTimeout(recordingTimer);

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (recognition) {
                try {
                    recognition.stop();
                } catch(e) {}
                recognition = null;
            }
            if (waveformAnimId) {
                cancelAnimationFrame(waveformAnimId);
                waveformAnimId = null;
            }

            setTimeout(() => {
                state.status = 'idle';
                saveState();
                renderSentences();
            }, 300);

            if (audioContext && audioContext.state === 'running') {
                audioContext.close().catch(()=>{});
                audioContext = null;
                analyser = null;
            }
        }

        function handlePlayback(idx) {
            const state = sentenceStates[idx];
            if (!state || !state.audioBlob) return;
            const url = URL.createObjectURL(state.audioBlob);
            const audio = new Audio(url);
            audio.play();
            audio.onended = () => URL.revokeObjectURL(url);
        }

        function handleScore(idx) {
            const state = sentenceStates[idx];
            if (!state || !state.audioBlob) {
                alert('请先录音再评分');
                return;
            }

            if (state.transcript && state.transcript.trim().length > 0) {
                performComparison(idx);
                return;
            }

            const inputArea = document.querySelector(`.sentence-card[data-index="${idx}"] .manual-input-area`);
            if (inputArea) {
                inputArea.classList.add('show');
                const input = inputArea.querySelector('input');
                if (input) input.focus();
            } else {
                renderSentences();
                const newInput = document.getElementById(`manualInput_${idx}`);
                if (newInput) newInput.focus();
            }
        }

        function handleManualScore(e) {
            const btn = e.currentTarget;
            const idx = parseInt(btn.dataset.idx);
            const input = document.getElementById(`manualInput_${idx}`);
            if (!input) return;
            const text = input.value.trim();
            if (!text) {
                alert('请输入您刚才说的内容');
                return;
            }
            const state = sentenceStates[idx];
            state.transcript = text;
            saveState();
            performComparison(idx);
        }

        function performComparison(idx) {
            const state = sentenceStates[idx];
            const original = passages[currentPassageIndex]?.sentences[idx]?.en || '';
            const transcript = state.transcript || '';
            if (!transcript.trim()) {
                alert('没有可对比的文本，请录音或手动输入');
                return;
            }
            const result = compareWords(original, transcript);
            state.wordResults = result.results;
            state.accuracy = result.accuracy;
            state.status = 'done';
            saveState();
            renderSentences();
            updateProgress();

            const allDone = sentenceStates.every(s => s.status === 'done');
            if (allDone && sentenceStates.length > 0) {
                isTrainingComplete = true;
                showReport();
                updateHistory();
            }
        }

        function compareWords(original, transcript) {
            const origWords = original.toLowerCase().replace(/[^a-z' ]/g, '').split(/\s+/).filter(w => w);
            const transWords = transcript.toLowerCase().replace(/[^a-z' ]/g, '').split(/\s+/).filter(w => w);
            const results = [];
            let matchCount = 0;
            for (let i = 0; i < origWords.length; i++) {
                const w = origWords[i];
                const match = (i < transWords.length && transWords[i] === w);
                if (match) matchCount++;
                results.push({
                    word: w,
                    match: match,
                    correct: w
                });
            }
            const accuracy = origWords.length > 0 ? Math.round((matchCount / origWords.length) * 100) : 0;
            return { results, accuracy };
        }

        // ================================================================
        // 7. 全局训练流程
        // ================================================================
        function startTraining() {
            if (trainingActive) return;
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (sentences.length === 0) return;

            if (sentenceStates.every(s => s.status === 'done')) {
                alert('已完成所有句子，可查看报告或重新训练。');
                return;
            }

            const idx = sentenceStates.findIndex(s => s.status !== 'done');
            if (idx === -1) {
                showReport();
                return;
            }
            currentSentenceIndex = idx;
            trainingActive = true;
            mainBtn.disabled = true;
            mainBtn.textContent = '⏳ 训练中...';
            startGlobalTTS(idx);
        }

        function startGlobalTTS(index) {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (index >= sentences.length) {
                finishTraining();
                return;
            }
            sentenceStates[index].status = 'tts';
            saveState();
            renderSentences();
            updateProgress();

            const text = sentences[index].en;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            ttsUtterance = utterance;

            utterance.onend = () => {
                startGlobalRecording(index);
            };
            utterance.onerror = () => {
                startGlobalRecording(index);
            };
            window.speechSynthesis.speak(utterance);
        }

        function startGlobalRecording(index) {
            const state = sentenceStates[index];
            state.status = 'recording';
            state.transcript = '';
            saveState();
            renderSentences();
            updateProgress();
            isRecording = true;
            stopBtn.style.display = 'inline-block';
            mainBtn.disabled = true;

            const startStream = (stream) => {
                cachedStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                currentRecordingBlob = null;
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    currentRecordingBlob = blob;
                    state.audioBlob = blob;
                    saveState();
                };
                mediaRecorder.start();

                if (hasRecognition) {
                    try {
                        recognition = new SR();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = 'en-US';
                        recognition.onresult = (event) => {
                            let final = '';
                            let interim = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    final += event.results[i][0].transcript;
                                } else {
                                    interim += event.results[i][0].transcript;
                                }
                            }
                            if (final) {
                                state.transcript = final.trim();
                                saveState();
                            } else if (interim) {
                                state.transcript = interim.trim();
                                saveState();
                            }
                        };
                        recognition.onerror = () => {};
                        recognition.start();
                    } catch(e) {}
                }

                const canvas = document.getElementById(`waveCanvas_${index}`);
                if (canvas) setupWaveform(canvas);

                clearTimeout(recordingTimer);
                recordingTimer = setTimeout(() => {
                    if (state.status === 'recording') stopGlobalRecording(index);
                }, 15000);
            };

            if (cachedStream) {
                startStream(cachedStream);
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        startStream(stream);
                    })
                    .catch(err => {
                        alert('麦克风授权被拒绝，请允许麦克风权限后重试。');
                        resetTraining();
                    });
            }
        }

        function stopGlobalRecording(index) {
            const state = sentenceStates[index];
            if (!state || state.status !== 'recording') return;
            isRecording = false;
            clearTimeout(recordingTimer);
            stopBtn.style.display = 'none';

            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }
            if (waveformAnimId) {
                cancelAnimationFrame(waveformAnimId);
                waveformAnimId = null;
            }

            setTimeout(() => {
                const transcript = state.transcript || '';
                const original = passages[currentPassageIndex]?.sentences[index]?.en || '';
                if (transcript.trim()) {
                    const result = compareWords(original, transcript);
                    state.wordResults = result.results;
                    state.accuracy = result.accuracy;
                    state.status = 'done';
                } else {
                    state.status = 'idle';
                }
                saveState();
                renderSentences();
                updateProgress();

                if (audioContext && audioContext.state === 'running') {
                    audioContext.close().catch(()=>{});
                    audioContext = null;
                    analyser = null;
                }

                const nextIdx = index + 1;
                const allDone = sentenceStates.every(s => s.status === 'done');
                if (allDone || nextIdx >= sentenceStates.length) {
                    finishTraining();
                } else {
                    currentSentenceIndex = nextIdx;
                    setTimeout(() => {
                        startGlobalTTS(nextIdx);
                    }, 600);
                }
            }, 400);
        }

        function finishTraining() {
            trainingActive = false;
            isTrainingComplete = true;
            mainBtn.disabled = false;
            mainBtn.textContent = '✅ 已完成';
            stopBtn.style.display = 'none';
            saveState();
            renderSentences();
            updateProgress();
            showReport();
            updateHistory();
        }

        function resetTraining() {
            trainingActive = false;
            isRecording = false;
            clearTimeout(recordingTimer);
            stopBtn.style.display = 'none';
            if (ttsUtterance) {
                window.speechSynthesis.cancel();
                ttsUtterance = null;
            }
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
            if (waveformAnimId) { cancelAnimationFrame(waveformAnimId); waveformAnimId = null; }
            if (audioContext) { audioContext.close().catch(()=>{}); audioContext = null; analyser = null; }
            mainBtn.disabled = false;
            mainBtn.textContent = '▶ 开始训练';
            const sentences = passages[currentPassageIndex]?.sentences || [];
            sentenceStates = sentences.map(() => ({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false }));
            isTrainingComplete = false;
            saveState();
            renderSentences();
            updateProgress();
            reportArea.classList.remove('show');
        }

        function updateProgress() {
            const total = sentenceStates.length;
            const done = sentenceStates.filter(s => s.status === 'done').length;
            progressText.textContent = `${done} / ${total}`;
        }

        // ================================================================
        // 8. 波形可视化
        // ================================================================
        function setupWaveform(canvas) {
            canvasEl = canvas;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            canvasCtx = canvas.getContext('2d');
            drawWaveform();
        }

        function drawWaveform() {
            if (!canvasCtx || !analyser || !dataArray || !canvasEl) return;
            const parent = canvasEl.parentElement;
            const width = parent ? parent.clientWidth : 300;
            const height = 40;
            canvasEl.width = width * 2;
            canvasEl.height = height * 2;
            canvasEl.style.width = width + 'px';
            canvasEl.style.height = height + 'px';
            canvasCtx.scale(2, 2);

            analyser.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = '#f5f0eb';
            canvasCtx.fillRect(0, 0, width, height);
            canvasCtx.lineWidth = 2.5;
            canvasCtx.beginPath();
            const sliceWidth = width / dataArray.length;
            let x = 0;
            let maxVal = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0 - 1.0;
                const y = v * (height/2) + height/2;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
                if (Math.abs(v) > maxVal) maxVal = Math.abs(v);
            }
            const intensity = Math.min(maxVal * 1.5, 1);
            let color = '#7aa87a';
            if (intensity > 0.5) color = '#d4a373';
            if (intensity > 0.8) color = '#c0392b';
            canvasCtx.strokeStyle = color;
            canvasCtx.stroke();

            if (isRecording) {
                waveformAnimId = requestAnimationFrame(drawWaveform);
            }
        }

        // ================================================================
        // 9. 报告 & 历史
        // ================================================================
        function showReport() {
            const states = sentenceStates;
            const done = states.filter(s => s.status === 'done');
            if (done.length === 0) return;
            const accuracies = done.map(s => s.accuracy || 0);
            const totalAcc = Math.round(accuracies.reduce((a,b) => a+b, 0) / accuracies.length);
            reportStats.innerHTML = `
                <div><strong>总准确率</strong> ${totalAcc}%</div>
                <div><strong>已完成</strong> ${done.length}/${states.length}</div>
            `;

            const sorted = done.map((s, i) => ({ idx: i, acc: s.accuracy || 0, text: passages[currentPassageIndex]?.sentences[i]?.en || '' }))
                .sort((a,b) => a.acc - b.acc);
            const worst = sorted.slice(0, 3);
            worstSentencesEl.innerHTML = `<strong>📉 最差3句</strong><br>` + worst.map(w =>
                `<div style="margin:4px 0;">${w.text.substring(0, 60)}${w.text.length > 60 ? '...' : ''} — 准确率 ${w.acc}%</div>`
            ).join('');

            const errorMap = new Map();
            done.forEach(s => {
                (s.wordResults || []).forEach(w => {
                    if (!w.match) {
                        errorMap.set(w.word, (errorMap.get(w.word) || 0) + 1);
                    }
                });
            });
            const sortedErrors = Array.from(errorMap.entries()).sort((a,b) => b[1] - a[1]);
            errorWordsSummaryEl.innerHTML = `<strong>🔴 错词汇总</strong><br>` +
                (sortedErrors.length ? sortedErrors.map(([word, count]) =>
                    `<span style="background:#fdedec; padding:2px 14px; border-radius:20px; margin:4px; display:inline-block; color:#a93226;">${word} (${count}次)</span>`
                ).join('') : '🎉 没有错词！');

            reportArea.classList.add('show');
        }

        function updateHistory() {
            const raw = localStorage.getItem('shadowReadHistory_v2');
            let history = raw ? JSON.parse(raw) : [];
            const recent = history.slice(-5).reverse();
            historyList.innerHTML = recent.length ? recent.map(h =>
                `<div class="history-item"><span>${h.time || ''}</span><span>准确率 ${h.accuracy || 0}% · ${h.title || ''}</span></div>`
            ).join('') : '<div style="color:#8a7a6a;">暂无记录</div>';
        }

        function saveHistory(accuracy) {
            const raw = localStorage.getItem('shadowReadHistory_v2');
            let history = raw ? JSON.parse(raw) : [];
            history.push({
                time: new Date().toLocaleString(),
                accuracy: accuracy,
                title: passages[currentPassageIndex]?.title || '范文'
            });
            if (history.length > 20) history = history.slice(-20);
            localStorage.setItem('shadowReadHistory_v2', JSON.stringify(history));
            updateHistory();
        }

        // ================================================================
        // 10. 全局事件绑定
        // ================================================================
        function bindEvents() {
            passageSelect.addEventListener('change', function() {
                if (trainingActive) {
                    if (!confirm('切换范文将中断当前训练，确定吗？')) return;
                }
                currentPassageIndex = parseInt(this.value);
                resetAllState();
                saveState();
                renderSentences();
                updateProgress();
                reportArea.classList.remove('show');
                mainBtn.textContent = '▶ 开始训练';
                stopBtn.style.display = 'none';
                isTrainingComplete = false;
            });

            mainBtn.addEventListener('click', function() {
                if (isTrainingComplete) {
                    if (confirm('已完成训练，是否重新开始？')) {
                        resetAllState();
                        renderSentences();
                        updateProgress();
                        reportArea.classList.remove('show');
                        mainBtn.textContent = '▶ 开始训练';
                        isTrainingComplete = false;
                        startTraining();
                    }
                    return;
                }
                startTraining();
            });

            stopBtn.addEventListener('click', function() {
                if (isRecording) {
                    const idx = sentenceStates.findIndex(s => s.status === 'recording');
                    if (idx !== -1) stopGlobalRecording(idx);
                }
            });

            document.getElementById('retrainBtn').addEventListener('click', function() {
                if (confirm('重新训练将清空当前进度，确定吗？')) {
                    resetAllState();
                    renderSentences();
                    updateProgress();
                    reportArea.classList.remove('show');
                    mainBtn.textContent = '▶ 开始训练';
                    isTrainingComplete = false;
                    localStorage.removeItem(STORAGE_KEY);
                }
            });

            document.getElementById('exportReportBtn').addEventListener('click', function() {
                const lines = [];
                const states = sentenceStates;
                const sentences = passages[currentPassageIndex]?.sentences || [];
                lines.push(`📋 影子跟读报告 — ${passages[currentPassageIndex]?.title || ''}`);
                lines.push(`时间: ${new Date().toLocaleString()}`);
                states.forEach((s, i) => {
                    const text = sentences[i]?.en || '';
                    const zh = sentences[i]?.zh || '';
                    const acc = s.accuracy || 0;
                    lines.push(`\n${i+1}. ${text}`);
                    lines.push(`   翻译: ${zh}`);
                    lines.push(`   准确率: ${acc}%`);
                    if (s.transcript) lines.push(`   识别: ${s.transcript}`);
                    if (s.wordResults) {
                        const w = s.wordResults.map(w => w.match ? `✅${w.word}` : `❌${w.word}(${w.correct})`).join(' ');
                        lines.push(`   对比: ${w}`);
                    }
                });
                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `shadow_report_${Date.now()}.txt`;
                a.click();
            });

            versionBadge.addEventListener('dblclick', function() {
                if (confirm('⚠️ 确定清空所有本地数据？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem('shadowReadHistory_v2');
                    resetAllState();
                    renderSentences();
                    updateProgress();
                    reportArea.classList.remove('show');
                    mainBtn.textContent = '▶ 开始训练';
                    isTrainingComplete = false;
                    updateHistory();
                    alert('已清空所有数据');
                }
            });
        }

        // ================================================================
        // 启动
        // ================================================================
        init();
    })();
</script>
