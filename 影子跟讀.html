<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能影子跟读 · 阳光版</title>
    <style>
        /* ===== 全局重置 & 明亮主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf7f2;
            color: #2d2d2d;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 860px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e0d8;
        }

        .app-header h1 {
            font-weight: 600;
            font-size: 1.6rem;
            color: #4fc3f7;
            letter-spacing: 0.5px;
        }

        .app-header h1 span {
            color: #ffb74d;
        }

        .version-badge {
            font-size: 0.75rem;
            background: #e8e0d8;
            padding: 4px 14px;
            border-radius: 30px;
            color: #6a6a6a;
            cursor: default;
            user-select: none;
            transition: 0.2s;
        }

        .version-badge:active {
            transform: scale(0.95);
        }

        /* ===== 浏览器警告 ===== */
        .browser-warning {
            background: #fff3e0;
            color: #e65100;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #ffb74d;
        }

        .browser-warning.show {
            display: flex;
        }

        /* ===== 控制栏 ===== */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 14px;
            margin-bottom: 24px;
            background: #ffffff;
            padding: 14px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8e0d8;
        }

        .control-bar select {
            background: #f5f0eb;
            color: #2d2d2d;
            border: 1px solid #d5cdc5;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            min-width: 160px;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }

        .control-bar select:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }

        .progress-text {
            font-size: 0.95rem;
            background: #f5f0eb;
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid #d5cdc5;
            white-space: nowrap;
            font-weight: 500;
            color: #5a5a5a;
        }

        .action-btn {
            background: #4fc3f7;
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            margin-left: auto;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(79, 195, 247, 0.35);
        }

        .action-btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            cursor: not-allowed;
        }

        .action-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .action-btn.secondary {
            background: #ffb74d;
            box-shadow: 0 4px 14px rgba(255, 183, 77, 0.35);
        }

        .action-btn.outline {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
            box-shadow: none;
        }

        .action-btn.outline:hover {
            background: #e3f4fc;
        }

        /* ===== 句子列表 ===== */
        .sentences-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 20px 0 28px;
        }

        .sentence-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px 22px;
            border-left: 6px solid #d5cdc5;
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #ece5dd;
        }

        .sentence-card.active-tts {
            border-left-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2), 0 4px 20px rgba(79, 195, 247, 0.15);
            animation: breathe-glow-light 1.6s infinite;
        }

        @keyframes breathe-glow-light {
            0% { box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15), 0 2px 12px rgba(0,0,0,0.05); }
            50% { box-shadow: 0 0 0 6px rgba(79, 195, 247, 0.25), 0 4px 24px rgba(79, 195, 247, 0.2); }
            100% { box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15), 0 2px 12px rgba(0,0,0,0.05); }
        }

        .sentence-card.recording {
            border-left-color: #ef5350;
            box-shadow: 0 0 0 3px rgba(239, 83, 80, 0.2), 0 4px 20px rgba(239, 83, 80, 0.1);
            animation: pulse-rec-light 0.9s infinite;
        }

        @keyframes pulse-rec-light {
            0% { box-shadow: 0 0 0 3px rgba(239, 83, 80, 0.15); }
            50% { box-shadow: 0 0 0 8px rgba(239, 83, 80, 0.25); }
            100% { box-shadow: 0 0 0 3px rgba(239, 83, 80, 0.15); }
        }

        .sentence-card.completed {
            border-left-color: #66bb6a;
            opacity: 1;
        }

        .sentence-card .sentence-text {
            font-size: 17px;
            line-height: 1.7;
            color: #2d2d2d;
            cursor: pointer;
            padding: 4px 0;
            border-radius: 4px;
            transition: 0.2s;
            user-select: none;
        }

        .sentence-card .sentence-text.hidden {
            background: #d5cdc5;
            color: transparent;
            border-radius: 6px;
            padding: 4px 8px;
            min-height: 1.7em;
            cursor: pointer;
        }

        .sentence-card .sentence-text.hidden::before {
            content: "👆 点击显示英文";
            color: #6a6a6a;
            font-size: 14px;
        }

        .sentence-card .translation-area {
            margin-top: 8px;
            font-size: 15px;
            color: #6a6a6a;
            padding: 6px 10px;
            background: #f5f0eb;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s;
            min-height: 2.2em;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .sentence-card .translation-area.hidden {
            background: #d5cdc5;
            color: transparent;
        }

        .sentence-card .translation-area.hidden::before {
            content: "👆 点击显示翻译";
            color: #6a6a6a;
            font-size: 14px;
        }

        .sentence-card .translation-area .zh-text {
            color: #2d2d2d;
        }

        .sentence-card .translation-area.hidden .zh-text {
            display: none;
        }

        /* ===== 卡片状态栏 ===== */
        .sentence-card .card-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.82rem;
            color: #8a8a8a;
            flex-wrap: wrap;
            gap: 6px;
        }

        .sentence-card .accuracy-badge {
            color: #66bb6a;
            font-weight: 600;
            background: #e8f5e9;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* ===== 对比结果 ===== */
        .sentence-card .comparison-result {
            margin-top: 12px;
            background: #f5f0eb;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
            flex-wrap: wrap;
            gap: 4px 6px;
            border-left: 4px solid #4fc3f7;
        }

        .sentence-card .comparison-result.show {
            display: flex;
        }

        .word-match {
            color: #66bb6a;
            font-weight: 500;
        }

        .word-mismatch {
            color: #ef5350;
            background: #ffebee;
            padding: 0 6px;
            border-radius: 4px;
            position: relative;
            font-weight: 500;
        }

        .word-mismatch::after {
            content: attr(data-correct);
            position: absolute;
            bottom: -1.4em;
            left: 0;
            font-size: 0.7rem;
            color: #c62828;
            background: #fff;
            padding: 0 8px;
            border-radius: 6px;
            white-space: nowrap;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .word-mismatch:hover::after {
            display: block;
        }

        /* ===== 波形 ===== */
        .waveform-wrapper {
            background: #f5f0eb;
            border-radius: 14px;
            padding: 6px 0;
            margin: 8px 0 4px;
            height: 54px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .waveform-wrapper.active {
            display: flex;
        }

        .waveform-wrapper canvas {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            background: #f5f0eb;
        }

        /* ===== 每句独立按钮组 ===== */
        .sentence-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #ece5dd;
        }

        .sentence-actions .mini-btn {
            background: #f5f0eb;
            border: 1px solid #d5cdc5;
            color: #2d2d2d;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sentence-actions .mini-btn:hover {
            background: #ece5dd;
        }

        .sentence-actions .mini-btn.active {
            background: #ef5350;
            color: #fff;
            border-color: #ef5350;
            animation: pulse-rec-light 0.9s infinite;
        }

        .sentence-actions .mini-btn.primary {
            background: #4fc3f7;
            color: #fff;
            border-color: #4fc3f7;
        }

        .sentence-actions .mini-btn.primary:hover {
            background: #3db8e8;
        }

        .sentence-actions .mini-btn.success {
            background: #66bb6a;
            color: #fff;
            border-color: #66bb6a;
        }

        .sentence-actions .mini-btn.success:hover {
            background: #55a859;
        }

        .sentence-actions .mini-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 报告区域 ===== */
        .report-area {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            margin-top: 30px;
            display: none;
            border: 1px solid #e8e0d8;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .report-area.show {
            display: block;
        }

        .report-area h3 {
            color: #4fc3f7;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .report-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 24px 40px;
            background: #f5f0eb;
            padding: 16px 24px;
            border-radius: 16px;
        }

        .report-stats div {
            font-size: 0.95rem;
        }

        .report-stats strong {
            color: #4fc3f7;
        }

        .report-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        /* ===== 历史记录 ===== */
        .history-area {
            margin-top: 28px;
            background: #ffffff;
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 0.9rem;
            border: 1px solid #e8e0d8;
        }

        .history-area h4 {
            color: #8a8a8a;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #f0ebe5;
            color: #4a4a4a;
        }

        /* ===== 通用 ===== */
        .flex-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mt-8 { margin-top: 8px; }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-btn {
                margin-left: 0;
                text-align: center;
            }
            .sentence-actions {
                gap: 6px;
            }
            .sentence-actions .mini-btn {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
            .sentence-card .sentence-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- 头部 -->
    <div class="app-header">
        <h1>☀️ 影子跟读 · <span>商业</span></h1>
        <span class="version-badge" id="versionBadge" title="双击清空所有数据">v2.0.0-local</span>
    </div>

    <!-- 浏览器警告 -->
    <div class="browser-warning" id="browserWarning">⚠️ 当前浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器。</div>

    <!-- 控制栏 -->
    <div class="control-bar">
        <select id="passageSelect"></select>
        <span class="progress-text" id="progressText">0 / 0</span>
        <button class="action-btn" id="mainActionBtn">▶ 开始训练</button>
        <button class="action-btn secondary" id="stopRecordingBtn" style="display:none;">⏹ 停止录音</button>
    </div>

    <!-- 句子列表 -->
    <div id="sentencesContainer" class="sentences-list"></div>

    <!-- 报告 -->
    <div class="report-area" id="reportArea">
        <h3>📊 训练报告</h3>
        <div class="report-stats" id="reportStats"></div>
        <div style="margin-top:14px; background:#f5f0eb; padding:14px 18px; border-radius:12px;" id="worstSentences"></div>
        <div style="margin-top:14px; background:#f5f0eb; padding:14px 18px; border-radius:12px;" id="errorWordsSummary"></div>
        <div class="report-actions">
            <button class="action-btn" id="retrainBtn">🔄 重新训练</button>
            <button class="action-btn secondary" id="exportReportBtn" style="background:#ffb74d; box-shadow:0 4px 14px rgba(255,183,77,0.35);">📄 导出报告</button>
        </div>
    </div>

    <!-- 历史记录 -->
    <div class="history-area" id="historyArea">
        <h4>📋 最近训练记录</h4>
        <div id="historyList"></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ================================================================
        // 1. 范文数据 (替换此处即可)
        // ================================================================
        const passages = [
            {
                title: "How to Handle Customer Complaints Effectively",
                sentences: [
                    { en: "When dealing with customer complaints, the first step is to listen actively.", zh: "在處理客戶投訴時，第一步是積極傾聽。" },
                    { en: "You should let the customer express their frustration without interruption.", zh: "你應該讓客戶完整表達他們的不滿，不要打斷。" },
                    { en: "After understanding the issue, apologize sincerely and take responsibility.", zh: "在了解問題之後，真誠地道歉並承擔責任。" },
                    { en: "Then, propose a clear solution and explain the steps you will take.", zh: "然後，提出明確的解決方案，並說明你將採取的步驟。" },
                    { en: "Finally, follow up with the customer to ensure their satisfaction.", zh: "最後，跟進客戶以確保他們滿意。" },
                    { en: "This approach not only resolves the problem but also builds trust.", zh: "這種方法不僅能解決問題，還能建立信任。" },
                    { en: "A well-handled complaint can turn a dissatisfied customer into a loyal one.", zh: "處理得當的投訴可以將不滿意的客戶轉變為忠實的客戶。" }
                ]
            },
            {
                title: "温暖的回眸（官方题目）",
                sentences: [
                    { en: "I'd like to talk about a warm memory that I often think about.", zh: "我想談談一個我經常想起的溫暖回憶。" },
                    { en: "It was a family gathering at my grandparents' house during the Lunar New Year a few years ago.", zh: "那是幾年前農曆新年期間，在我祖父母家的一次家庭聚會。" },
                    { en: "All my relatives came together, and we had a big feast with lots of traditional dishes.", zh: "所有的親戚都聚在一起，我們享用了一頓豐盛的大餐，有很多傳統菜餚。" },
                    { en: "What made it so special was that my grandmother, who usually stays in the kitchen, actually sat with us at the table and told stories about her childhood.", zh: "讓這次聚會特別的是，我奶奶——她通常都待在廚房裡——這次實際上和我們一起坐在餐桌旁，講述她童年的故事。" },
                    { en: "Everyone was laughing and sharing memories.", zh: "每個人都在笑著，分享著回憶。" },
                    { en: "It was one of the rare moments when the whole family was together without any stress or arguments.", zh: "那是少有的全家人毫無壓力或爭吵地聚在一起的時刻。" },
                    { en: "Looking back now, this memory is incredibly meaningful to me because my grandmother passed away the following year.", zh: "現在回想起來，這個回憶對我意義非凡，因為我奶奶在隔年去世了。" },
                    { en: "It reminds me of the importance of cherishing time with loved ones.", zh: "它提醒我珍惜與所愛之人相處的時光是多麼重要。" },
                    { en: "Whenever I think about that evening, I feel both happy and grateful.", zh: "每當我想起那個夜晚，我都感到既幸福又感恩。" }
                ]
            }
        ];

        // ================================================================
        // 2. 状态管理
        // ================================================================
        const STORAGE_KEY = 'shadowReadData_v2';
        let currentPassageIndex = 0;
        let sentenceStates = [];
        let trainingActive = false;
        let currentSentenceIndex = 0;
        let ttsUtterance = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let isRecording = false;
        let recordingTimer = null;
        let waveformAnimId = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let canvasCtx = null;
        let canvasEl = null;
        let isTrainingComplete = false;
        let cachedStream = null;          // 缓存麦克风流
        let currentRecordingBlob = null;  // 当前录音blob (用于回放)

        // DOM refs
        const passageSelect = document.getElementById('passageSelect');
        const progressText = document.getElementById('progressText');
        const mainBtn = document.getElementById('mainActionBtn');
        const stopBtn = document.getElementById('stopRecordingBtn');
        const sentencesContainer = document.getElementById('sentencesContainer');
        const reportArea = document.getElementById('reportArea');
        const reportStats = document.getElementById('reportStats');
        const worstSentencesEl = document.getElementById('worstSentences');
        const errorWordsSummaryEl = document.getElementById('errorWordsSummary');
        const historyList = document.getElementById('historyList');
        const browserWarning = document.getElementById('browserWarning');
        const versionBadge = document.getElementById('versionBadge');

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const hasRecognition = !!SR;

        // ================================================================
        // 3. 初始化
        // ================================================================
        function init() {
            if (!hasRecognition) {
                browserWarning.classList.add('show');
            }
            populatePassageSelect();
            loadFromStorageOrReset();
            bindEvents();
            renderSentences();
            updateProgress();
            updateHistory();
            checkUnfinished();
        }

        function populatePassageSelect() {
            passageSelect.innerHTML = '';
            passages.forEach((p, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = p.title || `范文 ${idx+1}`;
                passageSelect.appendChild(opt);
            });
            passageSelect.value = currentPassageIndex;
        }

        function loadFromStorageOrReset() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.passageIndex !== undefined && data.sentenceStates) {
                        currentPassageIndex = data.passageIndex;
                        sentenceStates = data.sentenceStates;
                        const sentences = passages[currentPassageIndex]?.sentences || [];
                        while (sentenceStates.length < sentences.length) {
                            sentenceStates.push({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false });
                        }
                        const allDone = sentenceStates.every(s => s.status === 'done');
                        if (allDone && sentenceStates.length > 0) {
                            isTrainingComplete = true;
                            showReport();
                        }
                        return;
                    }
                } catch(e) {}
            }
            resetAllState();
        }

        function resetAllState() {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            sentenceStates = sentences.map(() => ({
                status: 'idle',
                transcript: '',
                accuracy: 0,
                wordResults: [],
                audioBlob: null,
                enVisible: true,
                zhVisible: false
            }));
            isTrainingComplete = false;
            trainingActive = false;
            currentSentenceIndex = 0;
            reportArea.classList.remove('show');
            localStorage.removeItem(STORAGE_KEY);
            currentRecordingBlob = null;
        }

        function saveState() {
            const data = {
                passageIndex: currentPassageIndex,
                sentenceStates: sentenceStates
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function checkUnfinished() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.sentenceStates && data.sentenceStates.some(s => s.status === 'idle' || s.status === 'tts' || s.status === 'recording')) {
                        if (confirm('检测到未完成的训练，是否继续？')) {
                            renderSentences();
                            updateProgress();
                            return;
                        } else {
                            localStorage.removeItem(STORAGE_KEY);
                            resetAllState();
                            renderSentences();
                            updateProgress();
                        }
                    }
                } catch(e) {}
            }
        }

        // ================================================================
        // 4. 渲染句子
        // ================================================================
        function renderSentences() {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (sentences.length === 0) {
                sentencesContainer.innerHTML = '<div style="color:#8a8a8a; padding:20px; text-align:center;">暂无句子</div>';
                return;
            }
            while (sentenceStates.length < sentences.length) {
                sentenceStates.push({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false });
            }

            let html = '';
            sentences.forEach((s, idx) => {
                const state = sentenceStates[idx] || { status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false };
                let statusClass = '';
                let statusIcon = '⏳';
                let accuracyHtml = '';
                let comparisonHtml = '';
                let waveformHtml = '';
                let statusText = '待训练';

                if (state.status === 'tts') {
                    statusClass = 'active-tts';
                    statusIcon = '🔊';
                    statusText = '朗读中...';
                } else if (state.status === 'recording') {
                    statusClass = 'recording';
                    statusIcon = '🎙️';
                    statusText = '录音中...';
                } else if (state.status === 'done') {
                    statusClass = 'completed';
                    statusIcon = '✅';
                    statusText = '已完成';
                    const acc = state.accuracy || 0;
                    accuracyHtml = `<span class="accuracy-badge">${acc}%</span>`;
                    if (state.wordResults && state.wordResults.length) {
                        const wordsHtml = state.wordResults.map(w => {
                            if (w.match) return `<span class="word-match">${w.word}</span>`;
                            else return `<span class="word-mismatch" data-correct="${w.correct || ''}">${w.word}</span>`;
                        }).join(' ');
                        comparisonHtml = `<div class="comparison-result show">${wordsHtml}</div>`;
                    } else if (state.transcript) {
                        comparisonHtml = `<div class="comparison-result show" style="color:#6a6a6a;">识别: ${state.transcript}</div>`;
                    }
                }

                if (state.status === 'recording') {
                    waveformHtml = `
                        <div class="waveform-wrapper active" id="waveform_${idx}">
                            <canvas id="waveCanvas_${idx}"></canvas>
                        </div>
                    `;
                }

                // 英文可见性
                const enHidden = state.enVisible === false ? 'hidden' : '';
                // 中文可见性
                const zhHidden = state.zhVisible === false ? 'hidden' : '';
                const zhDisplay = state.zhVisible ? '' : '';

                html += `
                    <div class="sentence-card ${statusClass}" data-index="${idx}">
                        <div class="sentence-text ${enHidden}" data-idx="${idx}" data-type="en">${s.en}</div>
                        <div class="translation-area ${zhHidden}" data-idx="${idx}" data-type="zh">
                            <span class="zh-text">${s.zh}</span>
                        </div>
                        <div class="card-status">
                            <span>${statusIcon} ${statusText}</span>
                            ${accuracyHtml}
                        </div>
                        ${waveformHtml}
                        ${comparisonHtml}
                        <div class="sentence-actions">
                            <button class="mini-btn primary" data-action="play" data-idx="${idx}">▶ 播放</button>
                            <button class="mini-btn ${state.status === 'recording' ? 'active' : ''}" data-action="record" data-idx="${idx}">${state.status === 'recording' ? '⏹ 停止录音' : '🎙 录音'}</button>
                            <button class="mini-btn" data-action="playback" data-idx="${idx}" ${state.audioBlob ? '' : 'disabled'}>🔁 回放</button>
                            <button class="mini-btn success" data-action="score" data-idx="${idx}" ${state.audioBlob ? '' : 'disabled'}>📊 评分</button>
                        </div>
                    </div>
                `;
            });

            sentencesContainer.innerHTML = html;
            bindSentenceActions();

            const recIdx = sentenceStates.findIndex(s => s.status === 'recording');
            if (recIdx !== -1) {
                const canvas = document.getElementById(`waveCanvas_${recIdx}`);
                if (canvas) {
                    setupWaveform(canvas);
                }
            }
        }

        // ================================================================
        // 5. 每句独立按钮绑定
        // ================================================================
        function bindSentenceActions() {
            document.querySelectorAll('.sentence-actions').forEach(group => {
                group.querySelectorAll('.mini-btn').forEach(btn => {
                    btn.removeEventListener('click', handleAction);
                    btn.addEventListener('click', handleAction);
                });
            });

            // 英文点击遮挡
            document.querySelectorAll('.sentence-text').forEach(el => {
                el.removeEventListener('click', toggleEnVisibility);
                el.addEventListener('click', toggleEnVisibility);
            });
            // 中文点击遮挡
            document.querySelectorAll('.translation-area').forEach(el => {
                el.removeEventListener('click', toggleZhVisibility);
                el.addEventListener('click', toggleZhVisibility);
            });
        }

        function toggleEnVisibility(e) {
            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const state = sentenceStates[idx];
            if (!state) return;
            state.enVisible = !state.enVisible;
            saveState();
            renderSentences();
        }

        function toggleZhVisibility(e) {
            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const state = sentenceStates[idx];
            if (!state) return;
            state.zhVisible = !state.zhVisible;
            saveState();
            renderSentences();
        }

        function handleAction(e) {
            const btn = e.currentTarget;
            const action = btn.dataset.action;
            const idx = parseInt(btn.dataset.idx);
            if (isNaN(idx)) return;

            switch(action) {
                case 'play': handlePlay(idx); break;
                case 'record': handleRecord(idx); break;
                case 'playback': handlePlayback(idx); break;
                case 'score': handleScore(idx); break;
            }
        }

        // ================================================================
        // 6. 独立按钮功能
        // ================================================================
        function handlePlay(idx) {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (idx >= sentences.length) return;
            const text = sentences[idx].en;
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function handleRecord(idx) {
            const state = sentenceStates[idx];
            if (!state) return;

            if (state.status === 'recording') {
                // 停止录音
                stopRecording(idx);
                return;
            }

            // 开始录音
            startRecordingSingle(idx);
        }

        function startRecordingSingle(idx) {
            if (!navigator.mediaDevices) {
                alert('浏览器不支持麦克风');
                return;
            }

            const state = sentenceStates[idx];
            state.status = 'recording';
            saveState();
            renderSentences();
            isRecording = true;

            const startStream = (stream) => {
                cachedStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                currentRecordingBlob = null;
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    currentRecordingBlob = blob;
                    state.audioBlob = blob;
                    saveState();
                    // 更新回放按钮状态
                    renderSentences();
                };
                mediaRecorder.start();

                // 波形
                const canvas = document.getElementById(`waveCanvas_${idx}`);
                if (canvas) setupWaveform(canvas);

                // 超时15秒
                clearTimeout(recordingTimer);
                recordingTimer = setTimeout(() => {
                    if (state.status === 'recording') stopRecording(idx);
                }, 15000);
            };

            if (cachedStream) {
                // 复用流
                startStream(cachedStream);
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        startStream(stream);
                    })
                    .catch(err => {
                        alert('麦克风授权被拒绝，请在浏览器中允许麦克风权限后重试。');
                        state.status = 'idle';
                        saveState();
                        renderSentences();
                    });
            }
        }

        function stopRecording(idx) {
            const state = sentenceStates[idx];
            if (!state || state.status !== 'recording') return;
            isRecording = false;
            clearTimeout(recordingTimer);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (waveformAnimId) {
                cancelAnimationFrame(waveformAnimId);
                waveformAnimId = null;
            }
            state.status = 'idle';  // 录音结束回到idle，等待评分
            saveState();
            renderSentences();
            // 关闭音频上下文
            if (audioContext && audioContext.state === 'running') {
                audioContext.close().catch(()=>{});
                audioContext = null;
                analyser = null;
            }
        }

        function handlePlayback(idx) {
            const state = sentenceStates[idx];
            if (!state || !state.audioBlob) return;
            const url = URL.createObjectURL(state.audioBlob);
            const audio = new Audio(url);
            audio.play();
            audio.onended = () => URL.revokeObjectURL(url);
        }

        function handleScore(idx) {
            const state = sentenceStates[idx];
            if (!state || !state.audioBlob) {
                alert('请先录音再评分');
                return;
            }
            if (!hasRecognition) {
                alert('当前浏览器不支持语音识别');
                return;
            }

            // 使用语音识别（实时识别已经保存了transcript，这里触发一次最终识别）
            // 为了准确，我们重新进行一次识别（但这里用已有transcript）
            // 如果有transcript则直接对比，否则提示
            if (state.transcript) {
                performComparison(idx);
            } else {
                // 尝试用Web Speech API识别录音（通过播放录音再识别比较困难）
                // 简化：使用已经保存的transcript，如果没有则提示用户手动触发识别
                alert('没有检测到语音识别文本，请确保录音时麦克风正常工作。');
            }
        }

        function performComparison(idx) {
            const state = sentenceStates[idx];
            const original = passages[currentPassageIndex]?.sentences[idx]?.en || '';
            const transcript = state.transcript || '';
            const result = compareWords(original, transcript);
            state.wordResults = result.results;
            state.accuracy = result.accuracy;
            state.status = 'done';
            saveState();
            renderSentences();
            updateProgress();

            // 检查是否全部完成
            const allDone = sentenceStates.every(s => s.status === 'done');
            if (allDone && sentenceStates.length > 0) {
                isTrainingComplete = true;
                showReport();
                updateHistory();
            }
        }

        function compareWords(original, transcript) {
            const origWords = original.toLowerCase().replace(/[^a-z' ]/g, '').split(/\s+/).filter(w => w);
            const transWords = transcript.toLowerCase().replace(/[^a-z' ]/g, '').split(/\s+/).filter(w => w);
            const results = [];
            let matchCount = 0;
            for (let i = 0; i < origWords.length; i++) {
                const w = origWords[i];
                const match = (i < transWords.length && transWords[i] === w);
                if (match) matchCount++;
                results.push({
                    word: w,
                    match: match,
                    correct: w
                });
            }
            const accuracy = origWords.length > 0 ? Math.round((matchCount / origWords.length) * 100) : 0;
            return { results, accuracy };
        }

        // ================================================================
        // 7. 全局训练流程
        // ================================================================
        function startTraining() {
            if (trainingActive) return;
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (sentences.length === 0) return;

            if (sentenceStates.every(s => s.status === 'done')) {
                alert('已完成所有句子，可查看报告或重新训练。');
                return;
            }

            const idx = sentenceStates.findIndex(s => s.status !== 'done');
            if (idx === -1) {
                showReport();
                return;
            }
            currentSentenceIndex = idx;
            trainingActive = true;
            mainBtn.disabled = true;
            mainBtn.textContent = '⏳ 训练中...';
            startGlobalTTS(idx);
        }

        function startGlobalTTS(index) {
            const sentences = passages[currentPassageIndex]?.sentences || [];
            if (index >= sentences.length) {
                finishTraining();
                return;
            }
            sentenceStates[index].status = 'tts';
            saveState();
            renderSentences();
            updateProgress();

            const text = sentences[index].en;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            ttsUtterance = utterance;

            utterance.onend = () => {
                startGlobalRecording(index);
            };
            utterance.onerror = () => {
                startGlobalRecording(index);
            };
            window.speechSynthesis.speak(utterance);
        }

        function startGlobalRecording(index) {
            const state = sentenceStates[index];
            state.status = 'recording';
            saveState();
            renderSentences();
            updateProgress();
            isRecording = true;
            stopBtn.style.display = 'inline-block';
            mainBtn.disabled = true;

            const startStream = (stream) => {
                cachedStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                currentRecordingBlob = null;
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    currentRecordingBlob = blob;
                    state.audioBlob = blob;
                    saveState();
                };
                mediaRecorder.start();

                if (hasRecognition) {
                    recognition = new SR();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'en-US';
                    recognition.onresult = (event) => {
                        let final = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                final += event.results[i][0].transcript;
                            }
                        }
                        if (final) {
                            state.transcript = final.trim();
                            saveState();
                        }
                    };
                    recognition.start();
                }

                const canvas = document.getElementById(`waveCanvas_${index}`);
                if (canvas) setupWaveform(canvas);

                clearTimeout(recordingTimer);
                recordingTimer = setTimeout(() => {
                    if (state.status === 'recording') stopGlobalRecording(index);
                }, 15000);
            };

            if (cachedStream) {
                startStream(cachedStream);
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        startStream(stream);
                    })
                    .catch(err => {
                        alert('麦克风授权被拒绝，请允许麦克风权限后重试。');
                        resetTraining();
                    });
            }
        }

        function stopGlobalRecording(index) {
            const state = sentenceStates[index];
            if (!state || state.status !== 'recording') return;
            isRecording = false;
            clearTimeout(recordingTimer);
            stopBtn.style.display = 'none';
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            if (recognition) { recognition.stop(); recognition = null; }
            if (waveformAnimId) { cancelAnimationFrame(waveformAnimId); waveformAnimId = null; }

            const transcript = state.transcript || '';
            const original = passages[currentPassageIndex]?.sentences[index]?.en || '';
            const result = compareWords(original, transcript);
            state.wordResults = result.results;
            state.accuracy = result.accuracy;
            state.status = 'done';
            saveState();
            renderSentences();
            updateProgress();

            if (audioContext && audioContext.state === 'running') {
                audioContext.close().catch(()=>{});
                audioContext = null;
                analyser = null;
            }

            const nextIdx = index + 1;
            const allDone = sentenceStates.every(s => s.status === 'done');
            if (allDone || nextIdx >= sentenceStates.length) {
                finishTraining();
            } else {
                currentSentenceIndex = nextIdx;
                setTimeout(() => {
                    startGlobalTTS(nextIdx);
                }, 600);
            }
        }

        function finishTraining() {
            trainingActive = false;
            isTrainingComplete = true;
            mainBtn.disabled = false;
            mainBtn.textContent = '✅ 已完成';
            stopBtn.style.display = 'none';
            saveState();
            renderSentences();
            updateProgress();
            showReport();
            updateHistory();
        }

        function resetTraining() {
            trainingActive = false;
            isRecording = false;
            clearTimeout(recordingTimer);
            stopBtn.style.display = 'none';
            if (ttsUtterance) {
                window.speechSynthesis.cancel();
                ttsUtterance = null;
            }
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            if (recognition) { recognition.stop(); recognition = null; }
            if (waveformAnimId) { cancelAnimationFrame(waveformAnimId); waveformAnimId = null; }
            if (audioContext) { audioContext.close().catch(()=>{}); audioContext = null; analyser = null; }
            mainBtn.disabled = false;
            mainBtn.textContent = '▶ 开始训练';
            const sentences = passages[currentPassageIndex]?.sentences || [];
            sentenceStates = sentences.map(() => ({ status: 'idle', transcript: '', accuracy: 0, wordResults: [], audioBlob: null, enVisible: true, zhVisible: false }));
            isTrainingComplete = false;
            saveState();
            renderSentences();
            updateProgress();
            reportArea.classList.remove('show');
        }

        function updateProgress() {
            const total = sentenceStates.length;
            const done = sentenceStates.filter(s => s.status === 'done').length;
            progressText.textContent = `${done} / ${total}`;
        }

        // ================================================================
        // 8. 波形可视化
        // ================================================================
        function setupWaveform(canvas) {
            canvasEl = canvas;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            canvasCtx = canvas.getContext('2d');
            drawWaveform();
        }

        function drawWaveform() {
            if (!canvasCtx || !analyser || !dataArray || !canvasEl) return;
            const parent = canvasEl.parentElement;
            const width = parent ? parent.clientWidth : 300;
            const height = 42;
            canvasEl.width = width * 2;
            canvasEl.height = height * 2;
            canvasEl.style.width = width + 'px';
            canvasEl.style.height = height + 'px';
            canvasCtx.scale(2, 2);

            analyser.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = '#f5f0eb';
            canvasCtx.fillRect(0, 0, width, height);
            canvasCtx.lineWidth = 2.5;
            canvasCtx.beginPath();
            const sliceWidth = width / dataArray.length;
            let x = 0;
            let maxVal = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0 - 1.0;
                const y = v * (height/2) + height/2;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
                if (Math.abs(v) > maxVal) maxVal = Math.abs(v);
            }
            const intensity = Math.min(maxVal * 1.5, 1);
            let color = '#66bb6a';
            if (intensity > 0.5) color = '#ffb74d';
            if (intensity > 0.8) color = '#ef5350';
            canvasCtx.strokeStyle = color;
            canvasCtx.stroke();

            if (isRecording) {
                waveformAnimId = requestAnimationFrame(drawWaveform);
            }
        }

        // ================================================================
        // 9. 报告
        // ================================================================
        function showReport() {
            const states = sentenceStates;
            const done = states.filter(s => s.status === 'done');
            if (done.length === 0) return;
            const accuracies = done.map(s => s.accuracy || 0);
            const totalAcc = Math.round(accuracies.reduce((a,b) => a+b, 0) / accuracies.length);
            reportStats.innerHTML = `
                <div><strong>总准确率</strong> ${totalAcc}%</div>
                <div><strong>已完成</strong> ${done.length}/${states.length}</div>
            `;

            const sorted = done.map((s, i) => ({ idx: i, acc: s.accuracy || 0, text: passages[currentPassageIndex]?.sentences[i]?.en || '' }))
                .sort((a,b) => a.acc - b.acc);
            const worst = sorted.slice(0, 3);
            worstSentencesEl.innerHTML = `<strong>📉 最差3句</strong><br>` + worst.map(w =>
                `<div style="margin:4px 0;">${w.text.substring(0, 60)}${w.text.length > 60 ? '...' : ''} — 准确率 ${w.acc}%</div>`
            ).join('');

            const errorMap = new Map();
            done.forEach(s => {
                (s.wordResults || []).forEach(w => {
                    if (!w.match) {
                        errorMap.set(w.word, (errorMap.get(w.word) || 0) + 1);
                    }
                });
            });
            const sortedErrors = Array.from(errorMap.entries()).sort((a,b) => b[1] - a[1]);
            errorWordsSummaryEl.innerHTML = `<strong>🔴 错词汇总</strong><br>` +
                (sortedErrors.length ? sortedErrors.map(([word, count]) =>
                    `<span style="background:#ffebee; padding:2px 14px; border-radius:20px; margin:4px; display:inline-block; color:#c62828;">${word} (${count}次)</span>`
                ).join('') : '🎉 没有错词！');

            reportArea.classList.add('show');
        }

        // ================================================================
        // 10. 历史记录
        // ================================================================
        function updateHistory() {
            const raw = localStorage.getItem('shadowReadHistory_v2');
            let history = raw ? JSON.parse(raw) : [];
            const recent = history.slice(-5).reverse();
            historyList.innerHTML = recent.length ? recent.map(h =>
                `<div class="history-item"><span>${h.time || ''}</span><span>准确率 ${h.accuracy || 0}% · ${h.title || ''}</span></div>`
            ).join('') : '<div style="color:#8a8a8a;">暂无记录</div>';
        }

        function saveHistory(accuracy) {
            const raw = localStorage.getItem('shadowReadHistory_v2');
            let history = raw ? JSON.parse(raw) : [];
            history.push({
                time: new Date().toLocaleString(),
                accuracy: accuracy,
                title: passages[currentPassageIndex]?.title || '范文'
            });
            if (history.length > 20) history = history.slice(-20);
            localStorage.setItem('shadowReadHistory_v2', JSON.stringify(history));
            updateHistory();
        }

        // ================================================================
        // 11. 事件绑定
        // ================================================================
        function bindEvents() {
            passageSelect.addEventListener('change', function() {
                if (trainingActive) {
                    if (!confirm('切换范文将中断当前训练，确定吗？')) return;
                }
                currentPassageIndex = parseInt(this.value);
                resetAllState();
                saveState();
                renderSentences();
                updateProgress();
                reportArea.classList.remove('show');
                mainBtn.textContent = '▶ 开始训练';
                stopBtn.style.display = 'none';
                isTrainingComplete = false;
            });

            mainBtn.addEventListener('click', function() {
                if (isTrainingComplete) {
                    if (confirm('已完成训练，是否重新开始？')) {
                        resetAllState();
                        renderSentences();
                        updateProgress();
                        reportArea.classList.remove('show');
                        mainBtn.textContent = '▶ 开始训练';
                        isTrainingComplete = false;
                        startTraining();
                    }
                    return;
                }
                startTraining();
            });

            stopBtn.addEventListener('click', function() {
                if (isRecording) {
                    const idx = sentenceStates.findIndex(s => s.status === 'recording');
                    if (idx !== -1) stopGlobalRecording(idx);
                }
            });

            document.getElementById('retrainBtn').addEventListener('click', function() {
                if (confirm('重新训练将清空当前进度，确定吗？')) {
                    resetAllState();
                    renderSentences();
                    updateProgress();
                    reportArea.classList.remove('show');
                    mainBtn.textContent = '▶ 开始训练';
                    isTrainingComplete = false;
                    localStorage.removeItem(STORAGE_KEY);
                }
            });

            document.getElementById('exportReportBtn').addEventListener('click', function() {
                const lines = [];
                const states = sentenceStates;
                const sentences = passages[currentPassageIndex]?.sentences || [];
                lines.push(`📋 影子跟读报告 — ${passages[currentPassageIndex]?.title || ''}`);
                lines.push(`时间: ${new Date().toLocaleString()}`);
                states.forEach((s, i) => {
                    const text = sentences[i]?.en || '';
                    const zh = sentences[i]?.zh || '';
                    const acc = s.accuracy || 0;
                    lines.push(`\n${i+1}. ${text}`);
                    lines.push(`   翻译: ${zh}`);
                    lines.push(`   准确率: ${acc}%`);
                    if (s.transcript) lines.push(`   识别: ${s.transcript}`);
                    if (s.wordResults) {
                        const w = s.wordResults.map(w => w.match ? `✅${w.word}` : `❌${w.word}(${w.correct})`).join(' ');
                        lines.push(`   对比: ${w}`);
                    }
                });
                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `shadow_report_${Date.now()}.txt`;
                a.click();
            });

            versionBadge.addEventListener('dblclick', function() {
                if (confirm('⚠️ 确定清空所有本地数据？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem('shadowReadHistory_v2');
                    resetAllState();
                    renderSentences();
                    updateProgress();
                    reportArea.classList.remove('show');
                    mainBtn.textContent = '▶ 开始训练';
                    isTrainingComplete = false;
                    updateHistory();
                    alert('已清空所有数据');
                }
            });
        }

        // ================================================================
        // 启动
        // ================================================================
        init();
    })();
</script>
</body>
</html>
